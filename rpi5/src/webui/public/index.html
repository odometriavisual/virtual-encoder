<html lang="pt">
<head>
	<style>
		.wrapper {
			display: grid;
			grid-gap: 4px;
			font-family: 'sans-serif';

			grid-template-columns: 640px 168px;
			grid-template-rows: 480px calc(48px * 3 + 4px  * 2);
			grid-template-areas:
				"img     v-group"
				"h-group h-group";
		}

		.wrapper > .video-frame {
			width: 640px;
			height: 480px;
		}

		.wrapper > .v-group {
			grid-area: v-group;

			display: grid;
			grid-template-rows: 0.3fr 2fr 1fr 0.6fr 0.6fr;
			grid-auto-flow: column;
			grid-gap: 4px;

			user-select: none;
		}

		.wrapper > .h-group {
			grid-area: h-group;

			display: grid;
			grid-gap: 4px;

			grid-template-columns: repeat(13, 1fr);
			grid-template-rows: 0.3fr 0.3fr 1fr 1fr;
			grid-template-areas:
				"brilho brilho brilho brilho brilho brilho brilho brilho brilho brilho brilho brilho brilho"
				".      .      .      .      .      .      .      .      .      .      .      .      .     "
			    "calib  calib  calib  init-a init-a init-a stop-a stop-a stop-a .      reboot reboot reboot"
				"init-d init-d init-d modo-t modo-t modo-t modo-a modo-a modo-a .      shutd  shutd  shutd"
		}

		.brilho { grid-area: brilho; }
		.calibracao { grid-area: calib; }
		.iniciar-aquisicao { grid-area: init-a; }
		.parar-aquisicao { grid-area: stop-a; }
		.iniciar-download { grid-area: init-d; }
		.modo-tempo { grid-area: modo-t; }
		.modo-autonomo { grid-area: modo-a; }
		.reiniciar { grid-area: reboot; }
		.desligar { grid-area: shutd; }

		label { display: flex; gap: 8px; }
		label > div { align-self: center; }
		label > input { flex-grow: 1; min-width: 1px;}

		.v-group > div {
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
		}

		.ok {
			background-color: #009933;
			color: white;

			border: 1px solid #114221;
			border-radius: 4px;
		}

		.ok.warn {
			background-color: #d3cc2a;
			color: #353150;

			border: 1px solid #39391c;
			border-radius: 4px;
		}

		.err {
			background-color: #cc0000;
			color: white;

			border: 1px solid #aa1010;
			border-radius: 4px;
		}
	</style>
	<title>Virtual Encoder</title>
</head>
<body>
<script>
	window.onload = () => {
		const btns = {
			calibracao: document.querySelector('button.calibracao'),
			iniciar_aquisicao: document.querySelector('button.iniciar-aquisicao'),
			parar_aquisicao: document.querySelector('button.parar-aquisicao'),
			iniciar_download: document.querySelector('button.iniciar-download'),
			modo_tempo: document.querySelector('button.modo-tempo'),
			modo_autonomo: document.querySelector('button.modo-autonomo'),
			reiniciar: document.querySelector('button.reiniciar'),
			desligar: document.querySelector('button.desligar')
		};

		btns.calibracao.disabled = true;
		btns.iniciar_aquisicao.disabled = true;
		btns.parar_aquisicao.disabled = true;
		btns.iniciar_download.disabled = true;
		btns.modo_tempo.disabled = true;
		btns.modo_autonomo.disabled = true;
		btns.reiniciar.disabled = true;
		btns.desligar.disabled = true;

		const status_watcher = {
			rpi5: document.querySelector('.status.rpi5'),
			rpi0: document.querySelector('.status.rpi0'),
			camera: document.querySelector('.status.camera'),
			imu: document.querySelector('.status.imu'),
		};

		const video_frame = document.querySelector('.video-frame');
		video_frame.src = '/video_feed';
		video_frame.style = 'filter: brightness(1.0)';

		const brightness_slider = document.querySelector('.brilho > input');
		brightness_slider.value = 1;
		brightness_slider.oninput = () => {
			video_frame.style.filter = video_frame.style.filter.replace(/brightness(.*)/, `brightness(${brightness_slider.value})`);
		}

		async function next_estado(event) {
			event.target.disabled = true;

			const method = 'POST';
			await fetch('/next_estado', { method });
		}

		async function next_modo(event, modo) {
			event.target.disabled = true;

			const method = 'POST';
			await fetch(`/next_modo/${modo}`, { method });
		}

		btns.calibracao.addEventListener('click', next_estado);
		btns.iniciar_aquisicao.addEventListener('click', next_estado);
		btns.parar_aquisicao.addEventListener('click', next_estado);

		btns.iniciar_download.addEventListener('click', event => next_modo(event, 'Download'));
		btns.modo_autonomo.addEventListener('click', event => next_modo(event, 'Autonomo'));
		btns.modo_tempo.addEventListener('click', event => next_modo(event, 'Tempo'));

		btns.reiniciar.addEventListener('click', event => next_modo(event, 'reboot'));
		btns.desligar.addEventListener('click', event => next_modo(event, 'poweroff'));

		function update_classname(div, stat) {
			if (stat) div.className = div.className.replace('err', 'ok')
			else div.className = div.className.replace('ok', 'err')
		}

		function update_status(status) {
			update_classname(status_watcher.rpi5, status.rpi5);
			if (status.estado === 'Calibrando' || status.modo === 'Download') {
				status_watcher.rpi5.classList.add('warn');
			}
			else {
				status_watcher.rpi5.classList.remove('warn');
			}

			update_classname(status_watcher.rpi0, status.rpi0);
			update_classname(status_watcher.camera, status.camera);
			update_classname(status_watcher.imu, status.imu);

			status_watcher.rpi5.innerText = `RPi 5
			Modo ${status.modo}
			${status.rpi5 === false || status.modo === 'Download'? '':
					(status.estado === 'Calibrando'? `Calibrando ${status.rpi0.progress}%`: 'Estado' + status.estado)
			}
			${status.rpi5 ? `IP: ${status.rpi5.ip}` : ''}
			${status.rpi5? `Temp: ${status.rpi5.temp} ℃`: ''}`

			status_watcher.rpi0.innerText = `RPi Zero
			${status.rpi5 ? `Temp: ${status.rpi0.temp} ℃` : ''}`

			if (status.modo === 'Tempo') {
				btns.iniciar_download.disabled = false;
				btns.modo_tempo.disabled = true;
				btns.modo_autonomo.disabled = false;

				btns.calibracao.disabled = status.estado !== 'Set';
				btns.iniciar_aquisicao.disabled = status.estado !== 'Ready';
				btns.parar_aquisicao.disabled = status.estado !== 'Aquisicao';
			}
			else if (status.modo === 'Autonomo') {
				btns.iniciar_download.disabled = false;
				btns.modo_tempo.disabled = false;
				btns.modo_autonomo.disabled = true;

				btns.calibracao.disabled = true;
				btns.iniciar_aquisicao.disabled = true;
				btns.parar_aquisicao.disabled = true;
			}
			else if (status.modo === 'Download') {
				btns.iniciar_download.disabled = true;
				btns.modo_tempo.disabled = true;
				btns.modo_autonomo.disabled = true;

				btns.calibracao.disabled = true;
				btns.iniciar_aquisicao.disabled = true;
				btns.parar_aquisicao.disabled = true;
			}

			btns.reiniciar.disabled = status.rpi5 === false;
			btns.desligar.disabled = status.rpi5 === false;
		}

		async function fetch_status() {
			const headers = {
				'Accept': 'application/json',
				'Keep-Alive': 'timeout=5, max=-1'
			};
			const method = 'GET';
			const keepalive = true;
			const signal = AbortSignal.timeout(3000);

			try {
				const res = await fetch('/status', {headers, keepalive, method, signal});
				const status = await res.json();
				update_status(status);
			}
			catch (err) {
				update_status({
					rpi5: false, // { temp: 33., ip: '0.0.0.0', },
					rpi0: false, // { temp: 82.3, },
					camera: false,
					imu: false,
					modo: 'Desligado',
					estado: '',
				});
			}
		}
		setInterval(fetch_status, 1000);
		fetch_status();
	}
</script>
<div class="wrapper">
	<img class='video-frame'/>

	<div class="h-group">
		<label class="brilho">
			<div>Brilho:</div>
			<input type="range" min="0" max="5" step="0.05" value="1" />
		</label>

		<button class="calibracao" disabled>Iniciar Calibracao</button>
		<button class="iniciar-aquisicao" disabled>Iniciar Aquisição</button>
		<button class="parar-aquisicao" disabled>Parar Aquisição</button>

		<button class="reiniciar" disabled>Reiniciar</button>

		<button class="iniciar-download" disabled>Iniciar Download</button>
		<button class="modo-tempo" disabled>Modo Tempo</button>
		<button class="modo-autonomo" disabled>Modo Autonomo</button>

		<button class="desligar" disabled>Desligar</button>
	</div>

	<div class="v-group">
		<div>Monitoramento</div>
		<div class="status rpi5 err">
			RPi 5
		</div>
		<div class="status rpi0 err">RPi Zero</div>
		<div class="status camera err">Picam</div>
		<div class="status imu err">IMU</div>
	</div>
</div>
</body>
</html>
